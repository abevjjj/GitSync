name: Build unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift Package dependencies
        run: xcodebuild -resolvePackageDependencies -project GitSync.xcodeproj

      - name: Build (unsigned, for generic iOS device)
        run: |
          xcodebuild \
            -project GitSync.xcodeproj \
            -scheme GitSync \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            -derivedDataPath build \
            clean build

      - name: Package Payload/*.app into .ipa
        run: |
          set -e
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app")
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r GitSync-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitSync-unsigned-ipa
          path: GitSync-unsigned.ipa
