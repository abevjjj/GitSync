name: GitSync
options:
  bundleIdPrefix: com.shai.gitsync
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  SwiftGit2:
    url: https://github.com/App-Maker-Software/SwiftGit3
    branch: main

targets:
  GitSync:
    type: application
    platform: iOS
    sources:
      - path: GitSync
    dependencies:
      - package: SwiftGit2
    info:
      path: GitSync/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shai.gitsync.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_BITCODE: false
